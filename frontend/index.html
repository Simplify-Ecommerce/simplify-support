<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplify Support</title>
  <link rel="icon" href="assets/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="assets/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Top bar: hidden initially, slides in after asking -->
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="topbar-logo">
          <img src="assets/logo-horizontal.svg" alt="Simplify" onerror="this.style.display='none'">
        </div>
        <form class="topbar-form" id="topbar-form">
          <input class="topbar-input" id="top-input" type="text" placeholder="Haz otra pregunta…" autocomplete="off">
          <button class="topbar-btn" type="submit" aria-label="Enviar">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
      </div>
    </header>

    <!-- Hero: visible initially, fades out after asking -->
    <section class="hero" id="hero">
      <a class="status-badge" id="status-badge" href="https://www.shopifystatus.com/" target="_blank" rel="noopener noreferrer">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Verificando Shopify…</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <a class="hero-logo" href="/" aria-label="Simplify Support">
        <img src="assets/logo.svg" alt="Simplify" onerror="this.style.display='none'">
      </a>
      <p class="hero-subtitle">Centro de ayuda</p>
      <form class="hero-form" id="hero-form">
        <div class="search-box">
          <input class="search-input" id="main-input" type="text" placeholder="¿Cuál es tu duda?" autocomplete="off">
          <button class="search-btn" type="submit" aria-label="Enviar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </form>

      <div class="chips">
        <button class="chip" type="button">¿Cómo agrego productos a mi tienda?</button>
        <button class="chip" type="button">¿Cómo configuro los métodos de pago?</button>
        <button class="chip" type="button">Después de recibir mi tienda, ¿tengo alguna asistencia?</button>
        <button class="chip" type="button">¿Cómo sincronizo mi inventario con Exchanger?</button>
        <button class="chip" type="button">¿Exchanger ofrece soporte?</button>
      </div>
    </section>

    <!-- Documentation response area -->
    <main class="doc-content" id="doc-content">
      <article class="doc-article" id="doc-article"></article>

      <!-- TICKET SECTION — comentado temporalmente -->
